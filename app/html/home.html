<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Recommender</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f8f9fa;
            color: #1e1e2a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 680px;
            width: 100%;
        }

        .header {
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            color: #0b0b12;
            margin-bottom: 2px;
        }

        .header p {
            font-size: 0.95rem;
            color: #6b7280;
        }

        .header p span {
            color: #1e1e2a;
            font-weight: 500;
        }

        label {
            display: block;
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #1e1e2a;
        }

        textarea {
            width: 100%;
            padding: 14px 16px;
            font-family: inherit;
            font-size: 0.95rem;
            border: 1.5px solid #d1d5db;
            border-radius: 10px;
            background: #ffffff;
            resize: vertical;
            min-height: 110px;
            transition: border 0.2s, box-shadow 0.2s;
            color: #0b0b12;
            line-height: 1.6;
        }

        textarea:focus {
            outline: none;
            border-color: #0b0b12;
            box-shadow: 0 0 0 3px rgba(11, 11, 18, 0.06);
        }

        textarea::placeholder {
            color: #9ca3af;
        }

        .btn {
            margin-top: 16px;
            width: 100%;
            padding: 13px 0;
            background: #0b0b12;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.15s;
        }

        .btn:hover {
            background: #1e1e2a;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #error {
            margin-top: 16px;
            padding: 10px 14px;
            background: #fef2f2;
            border-left: 3px solid #dc2626;
            color: #991b1b;
            border-radius: 6px;
            font-size: 0.9rem;
            display: none;
        }

        #error.visible {
            display: block;
        }

        #loading {
            margin-top: 24px;
            text-align: center;
            color: #6b7280;
            font-size: 0.9rem;
            display: none;
        }

        #loading.visible {
            display: block;
        }

        #results {
            margin-top: 28px;
            display: none;
        }

        #results.visible {
            display: block;
        }

        .result-item {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 0;
            border-bottom: 1px solid #f1f3f5;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .rank {
            font-weight: 500;
            font-size: 0.8rem;
            color: #9ca3af;
            width: 22px;
            flex-shrink: 0;
            text-align: right;
        }

        .result-content {
            flex: 1;
        }

        .result-title {
            font-weight: 500;
            color: #0b0b12;
        }

        .result-meta {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 2px;
        }

        .result-source {
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            padding: 2px 10px;
            border-radius: 12px;
            background: #eef2f6;
            color: #4b5563;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .result-source.knn {
            background: #e6f7ed;
            color: #0b6e3e;
        }

        .result-source.popular {
            background: #fef6e0;
            color: #8a6700;
        }

        .empty-state {
            text-align: center;
            color: #9ca3af;
            padding: 20px 0 8px;
            font-size: 0.95rem;
        }

        @media (max-width: 480px) {
            body { padding: 16px; }
            .header h1 { font-size: 1.6rem; }
            .result-item { gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Course Recommender</h1>
            <p>8 recommendations · <span>7 k‑NN</span> + <span>1 popular</span></p>
        </div>

        <label for="coursesInput">Enter courses you have taken</label>
        <textarea id="coursesInput" placeholder="Crash Course on Python&#10;Python Basics&#10;Python for Data Science, AI & Development"></textarea>

        <button class="btn" id="recommendBtn">Get recommendations</button>

        <div id="error"></div>
        <div id="loading">Loading recommendations...</div>

        <div id="results"></div>
    </div>

    <script>
        (function() {
            const input = document.getElementById('coursesInput');
            const btn = document.getElementById('recommendBtn');
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');
            const errorDiv = document.getElementById('error');

            btn.addEventListener('click', async function() {
                const lines = input.value.split('\n').map(s => s.trim()).filter(s => s.length > 0);

                if (lines.length === 0) {
                    showError('Please enter at least one course.');
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Loading...';
                loadingDiv.classList.add('visible');
                resultsDiv.classList.remove('visible');
                errorDiv.classList.remove('visible');

                try {
                    const resp = await fetch('/recommend', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ course_titles: lines })
                    });

                    if (!resp.ok) {
                        const err = await resp.json();
                        throw new Error(err.detail || 'Server error');
                    }

                    const data = await resp.json();
                    renderResults(data.recommendations || []);
                } catch (err) {
                    showError(err.message || 'Failed to get recommendations.');
                } finally {
                    btn.disabled = false;
                    btn.textContent = 'Get recommendations';
                    loadingDiv.classList.remove('visible');
                }
            });

            function renderResults(recommendations) {
                resultsDiv.innerHTML = '';
                if (!recommendations || recommendations.length === 0) {
                    resultsDiv.innerHTML = '<div class="empty-state">No recommendations found</div>';
                    resultsDiv.classList.add('visible');
                    return;
                }

                let html = '';
                recommendations.forEach((rec, i) => {
                    const isPopular = rec.source && rec.source.includes('Popular');
                    const sourceClass = isPopular ? 'popular' : 'knn';
                    const sourceLabel = rec.source || 'k-NN';

                    const title = rec.course_title || rec.title || '—';
                    const org = rec.course_organization || rec.organization || '—';
                    const difficulty = rec.course_difficulty || rec.difficulty || '—';
                    const rating = rec.course_rating || rec.rating || '—';

                    let metaParts = [];
                    if (org && org !== '—') metaParts.push(org);
                    if (difficulty && difficulty !== '—') metaParts.push(difficulty);
                    if (rating && rating !== '—') metaParts.push(rating + '[*]');
                    const meta = metaParts.length > 0 ? metaParts.join(' · ') : '—';

                    html += `
                        <div class="result-item">
                            <div class="rank">${i + 1}</div>
                            <div class="result-content">
                                <div class="result-title">${escapeHtml(title)}</div>
                                <div class="result-meta">${escapeHtml(meta)}</div>
                            </div>
                            <div class="result-source ${sourceClass}">${emoji} ${escapeHtml(sourceLabel)}</div>
                        </div>
                    `;
                });

                resultsDiv.innerHTML = html;
                resultsDiv.classList.add('visible');
            }

            function showError(msg) {
                errorDiv.textContent = '[ ERROR ] ' + msg;
                errorDiv.classList.add('visible');
                setTimeout(() => errorDiv.classList.remove('visible'), 5000);
            }

            function escapeHtml(text) {
                if (!text) return '—';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        })();
    </script>
</body>
</html>
